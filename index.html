<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mistaken</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="site-ready is-loading">
  <div class="streaks" aria-hidden="true"></div>

  <section class="entry-loader" id="entryLoader" aria-label="Loading Mistaken">
    <div class="loader-streaks" aria-hidden="true"></div>
    <div class="loader-core" aria-live="polite">
      <h1>Mistaken</h1>
      <div class="loader-line">
        <span></span>
      </div>
      <p>Launching interface</p>
    </div>
  </section>

  <main class="hero-layout" aria-label="Mistaken hero">
    <p class="hero-kicker">Modern Proxy Interface</p>
    <h1 class="hero-title">Mistaken</h1>
    <p class="hero-subtitle">Sharp, fast, and built to expand.</p>
  </main>

  <section class="web-frame-shell" id="webFrameShell" aria-label="Website preview" aria-hidden="true">
    <iframe id="webFrame" title="Website frame" loading="eager" referrerpolicy="no-referrer"></iframe>
  </section>

  <button class="dock-toggle" id="dockToggle" aria-label="Toggle search dock" aria-expanded="true">
    <i data-lucide="chevron-up"></i>
  </button>

  <section class="search-dock" id="searchDock" aria-label="Search controls">
    <div class="dock-inner">
      <button class="dock-icon" id="homeBtn" aria-label="Go home">
        <i data-lucide="house"></i>
      </button>
      <button class="dock-icon" id="sectionsToggle" aria-label="Open sections" aria-expanded="false">
        <i data-lucide="layout-grid"></i>
      </button>
      <label class="search-wrap" for="proxySearch">
        <i data-lucide="search"></i>
        <input id="proxySearch" type="text" placeholder="Search the web..." autocomplete="off">
      </label>
      <button class="dock-icon" id="searchSubmit" aria-label="Run search">
        <i data-lucide="arrow-up-right"></i>
      </button>
      <button class="dock-icon" id="openDirect" aria-label="Open search in new tab">
        <i data-lucide="external-link"></i>
      </button>
    </div>
  </section>

  <section class="sections-panel" id="sectionsPanel" aria-label="Sections" aria-hidden="true">
    <div class="sections-grid" aria-label="Section launcher grid">
      <button class="section-tile" data-target="games/index.html?v=2" type="button">
        <h4>Games</h4>
        <p>Open the game launcher hub.</p>
      </button>
      <button class="section-tile" data-target="ai/index.html?v=2" type="button">
        <h4>AI</h4>
        <p>Open the AI chat interface.</p>
      </button>
      <button class="section-tile" data-target="settings/index.html?v=2" type="button">
        <h4>Settings</h4>
        <p>Theme, search engine, and cloaking.</p>
      </button>
    </div>
  </section>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="assets/js/theme-sync.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
