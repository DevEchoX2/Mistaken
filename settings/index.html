<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mistaken Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="settings-shell">
    <header>
      <p class="eyebrow">Section</p>
      <h1>Settings</h1>
      <p>Control theme, search engine, and cloaking behavior.</p>
    </header>

    <section class="panel">
      <h2>Appearance</h2>
      <label for="themeSelect">Theme</label>
      <select id="themeSelect"></select>
    </section>

    <section class="panel">
      <h2>Search</h2>
      <label for="engineSelect">Search Engine</label>
      <select id="engineSelect"></select>
    </section>

    <section class="panel">
      <h2>Cloaking</h2>
      <label for="cloakTitle">Tab Title</label>
      <input id="cloakTitle" type="text" placeholder="Google">

      <label for="cloakFavicon">Favicon URL</label>
      <input id="cloakFavicon" type="url" placeholder="https://www.google.com/favicon.ico">

      <button id="saveSettings" type="button">Save Settings</button>
      <button id="aboutBlank" type="button">Open about:blank Cloak</button>
      <button id="aboutBlankFallback" type="button">Cloak This Tab (No Popup)</button>
      <p id="statusText" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="../assets/js/section-theme-sync.js"></script>
  <script src="main.js"></script>
</body>
</html>
