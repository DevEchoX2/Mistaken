<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mistaken Games</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="games-shell">
    <header class="games-header">
      <p class="eyebrow">Section</p>
      <h1>Games</h1>
      <p>Pick a launcher link. If the site blocks iframes, use the open button.</p>
    </header>

    <section class="game-grid" aria-label="Game list">
      <button class="game-card" data-url="https://playsnake.org/" data-title="Snake">
        <h2>Snake</h2>
        <p>Classic snake controls with keyboard.</p>
      </button>
      <button class="game-card" data-url="https://hextris.io/" data-title="Hextris">
        <h2>Hextris</h2>
        <p>Fast arcade puzzle gameplay.</p>
      </button>
      <button class="game-card" data-url="https://2048game.com/" data-title="2048">
        <h2>2048</h2>
        <p>Merge tiles until you hit 2048.</p>
      </button>
    </section>

    <section class="play-area" aria-label="Game preview">
      <div class="play-head">
        <strong id="gameTitle">Ready</strong>
        <button id="openExternal" type="button">Open External</button>
      </div>
      <iframe id="gameFrame" title="Game preview frame" loading="lazy"></iframe>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
